services:
  redis:
    image: redis:7-alpine
    restart: on-failure
    ports:
      - '${REDIS_PORT}:6379'

  postgres:
    image: postgres:17.5
    restart: on-failure
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
